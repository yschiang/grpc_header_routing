# CI matrix (AD-14). NOTE: the workspace forbids pushing to any remote, so this
# workflow is validated by local-path equivalence (it mirrors the exact commands
# run locally per cell), NOT by a remote green run.
name: ci
on: [push, pull_request, workflow_dispatch]
jobs:
  matrix:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        cxx: [g++, clang++]
        protobuf: ['3.20.3', '3.21.12']
    env:
      PREFIX: ${{ github.workspace }}/pb-${{ matrix.protobuf }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
      - name: install toolchain deps
        run: sudo apt-get update && sudo apt-get install -y build-essential clang pkg-config cmake git zlib1g-dev libgrpc++-dev gcovr
      - name: formatting gate (clang-format 18.1.8, hand-written tree)
        # Pinned via pip so CI and dev use the identical binary (skew = phantom
        # diffs). format-check.sh hard-fails on any drift; sha256.h's dense crypto
        # is exempted in-file with // clang-format off. Runs before the build so a
        # formatting violation fails fast. One representative cell.
        if: matrix.cxx == 'g++' && matrix.protobuf == '3.21.12'
        working-directory: grpc-routing-meta/example
        run: |
          python3 -m pip install --quiet 'clang-format==18.1.8'
          export CLANG_FORMAT="$(python3 -c 'import clang_format,glob,os;print(glob.glob(os.path.join(os.path.dirname(clang_format.__file__),"data/bin/clang-format*"))[0])')"
          ./format-check.sh
      - name: cache protobuf prefix
        id: pbcache
        uses: actions/cache@v4
        with:
          path: ${{ env.PREFIX }}
          key: protobuf-${{ matrix.protobuf }}-ubuntu-22.04
      - name: build protobuf ${{ matrix.protobuf }} from source (pinned tag)
        if: steps.pbcache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v${{ matrix.protobuf }} https://github.com/protocolbuffers/protobuf
          if [ -f protobuf/CMakeLists.txt ]; then S=protobuf; else S=protobuf/cmake; fi
          cmake -S "$S" -B protobuf/build -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_INSTALL_LIBDIR=lib -Dprotobuf_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release -Dprotobuf_BUILD_SHARED_LIBS=ON
          cmake --build protobuf/build -j"$(nproc)" --target install
      - name: build + negative-codegen gate + binaries
        working-directory: grpc-routing-meta/example
        env:
          PROTOC: ${{ env.PREFIX }}/bin/protoc
          PKG_CONFIG_PATH: ${{ env.PREFIX }}/lib/pkgconfig
          LD_LIBRARY_PATH: ${{ env.PREFIX }}/lib
        run: ./build.sh
      - name: self-checks (the four binaries)
        working-directory: grpc-routing-meta/example
        env:
          LD_LIBRARY_PATH: ${{ env.PREFIX }}/lib
        run: |
          ./build/unified_sender
          ./build/receiver_verify
          ./build/test_projection
          ./build/bench_projection
          ./build/test_concurrency
      - name: gRPC compile-smoke (HR4, compile only)
        working-directory: grpc-routing-meta/example
        env:
          PKG_CONFIG_PATH: ${{ env.PREFIX }}/lib/pkgconfig
        run: |
          "$CXX" -std=c++17 -fsyntax-only -DROUTINGMETA_WITH_GRPC \
            -I build/generated -I src -I "$(pkg-config --variable=includedir protobuf)" \
            $(pkg-config --cflags grpc++) tests/grpc_smoke.cc
      - name: concurrency race gate (HR3, ThreadSanitizer)
        # AD-12/NFR5 re-entrancy proof: 8 threads share one immutable request, each
        # projects into its own sink; TSan exits non-zero on any data race. The
        # expensive sanitizer runs in ONE representative cell (clang++ has the most
        # mature TSan); the cheap functional equality run is matrix-wide via
        # ./build/test_concurrency in the self-checks step above. (TSan instruments
        # ProjectMeta's own TUs; libprotobuf is linked un-instrumented, but req is
        # const after construction — const reads only — so that path is race-free.)
        if: matrix.cxx == 'clang++' && matrix.protobuf == '3.21.12'
        working-directory: grpc-routing-meta/example
        env:
          PKG_CONFIG_PATH: ${{ env.PREFIX }}/lib/pkgconfig
          LD_LIBRARY_PATH: ${{ env.PREFIX }}/lib
          TSAN_OPTIONS: halt_on_error=1
        run: |
          "$CXX" -std=c++17 -fsanitize=thread -fno-omit-frame-pointer -pthread -O1 -g \
            tests/test_concurrency.cc build/generated/*.pb.cc build/generated/*.proj.cc \
            -I build/generated -I src -I "$(pkg-config --variable=includedir protobuf)" \
            -L "$(pkg-config --variable=libdir protobuf)" -lprotobuf \
            -Wl,-rpath,"$(pkg-config --variable=libdir protobuf)" \
            -o build/test_concurrency_tsan
          ./build/test_concurrency_tsan
      - name: leak + memory-safety gate (AddressSanitizer + LeakSanitizer + UBSan)
        # Proves the kit's resource-safety claim at runtime, not by inspection: the
        # three allocation paths (message build, projection, parse+digest) must be
        # free of leaks, use-after-free and UB. LSan only runs on Linux (unsupported
        # on the macOS dev host), so CI is its only home — locally only the ASan/UBSan
        # halves are reproducible. One representative cell, like the TSan gate.
        # libprotobuf keeps a process-lifetime descriptor pool reachable from globals
        # (not a leak by LSan's reachability definition); the suppression is a
        # belt-and-braces guard against a future protobuf static — the kit's own
        # allocations (std::string/vector, RAII) stay gated.
        if: matrix.cxx == 'clang++' && matrix.protobuf == '3.21.12'
        working-directory: grpc-routing-meta/example
        env:
          PKG_CONFIG_PATH: ${{ env.PREFIX }}/lib/pkgconfig
          LD_LIBRARY_PATH: ${{ env.PREFIX }}/lib
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          echo 'leak:libprotobuf' > build/lsan.supp
          export LSAN_OPTIONS="suppressions=$PWD/build/lsan.supp"
          PB_INC="$(pkg-config --variable=includedir protobuf)"
          PB_LIB="$(pkg-config --variable=libdir protobuf)"
          for cell in \
            tests/test_projection.cc:asan_test_projection \
            sender/unified_sender.cc:asan_unified_sender \
            receiver/receiver_verify.cc:asan_receiver_verify; do
            src="${cell%%:*}"; out="${cell##*:}"
            "$CXX" -std=c++17 -fsanitize=address,undefined -fno-omit-frame-pointer -O1 -g \
              "$src" build/generated/*.pb.cc build/generated/*.proj.cc \
              -I build/generated -I src -I "$PB_INC" \
              -L "$PB_LIB" -lprotobuf -Wl,-rpath,"$PB_LIB" \
              -o "build/$out"
            echo "== run $out under ASan+LSan+UBSan =="
            "./build/$out"
          done
      - name: line-coverage gate (gcovr, runtime kit >= 80%)
        # coverage.sh instruments the three drivers, runs them, and gcovr fails the
        # build if src/common line coverage drops below 80%. One representative cell;
        # g++ pairs with gcov natively. The plugin is gated by the negative fixtures.
        if: matrix.cxx == 'g++' && matrix.protobuf == '3.21.12'
        working-directory: grpc-routing-meta/example
        env:
          PKG_CONFIG_PATH: ${{ env.PREFIX }}/lib/pkgconfig
          LD_LIBRARY_PATH: ${{ env.PREFIX }}/lib
        run: ./coverage.sh
