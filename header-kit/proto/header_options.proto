// =============================================================================
// header_options.proto
//
// Receiver 提供的 custom option 定義。
// Sender 在自己的 message 欄位上標註 (header) option,框架/sample code
// 即可從「同一份 message 實例」同時產生:
//   - body  (XML)
//   - gRPC metadata headers (tool-header / lot-header / mask-header)
//
// 這是整套機制的 SSOT 契約:欄位與 header 的映射就在欄位旁邊,
// sender 改欄位時 header 不會漏改。
//
// 維護者: <receiver team>
// Extension number 50001~50001 已登記,請勿重複佔用。
// =============================================================================

syntax = "proto3";

package routing;

import "google/protobuf/descriptor.proto";

// -----------------------------------------------------------------------------
// Header 分組。對應 APISIX routing 用的三個 metadata header。
// -----------------------------------------------------------------------------
enum HeaderGroup {
  HEADER_GROUP_UNSPECIFIED = 0;  // 未標註 → 此欄位只進 body,不進 header
  TOOL = 1;                      // -> metadata key: "tool-header"  (cardinality 1, required)
  LOT  = 2;                      // -> metadata key: "lot-header"   (cardinality 1..N)
  MASK = 3;                      // -> metadata key: "mask-header"  (cardinality 0..N)
}

// -----------------------------------------------------------------------------
// 單一欄位的 header 映射意圖。
// 只描述「這個 scalar 欄位屬於哪個 group、在 header 裡的 key 叫什麼」。
// 不描述格式(URL-encode / & 串接 / cardinality 檢查)—— 那些由 sample code 統一處理,
// 保持 proto 乾淨、意圖清楚。
// -----------------------------------------------------------------------------
message HeaderMapping {
  HeaderGroup group = 1;  // 此欄位歸到哪個 header group
  string key = 2;         // header value 裡的 key 名,例如 "EqpID"

  // 選填:同一 group 內的輸出順序(小→大)。未填預設用 proto field number 排序。
  // 用途:讓 receiver 端 parse / APISIX match 時 key 順序穩定。
  int32 order = 3;
}

extend google.protobuf.FieldOptions {
  // 標在 scalar 欄位上。範例:
  //   string eqp_id = 1 [(routing.header) = {group: TOOL, key: "EqpID"}];
  HeaderMapping header = 50001;
}
