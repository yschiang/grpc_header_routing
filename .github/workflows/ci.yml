name: ci
on:
  push:
  pull_request:

jobs:
  matrix:
    name: ${{ matrix.cc }} · protobuf ${{ matrix.protobuf }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
        protobuf: ["3.20.3", "3.21.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake autoconf automake libtool curl pkg-config clang

      - name: Select compiler
        run: |
          if [ "${{ matrix.cc }}" = "clang" ]; then
            echo "CC=clang"   >> "$GITHUB_ENV"; echo "CXX=clang++" >> "$GITHUB_ENV"
          else
            echo "CC=gcc"     >> "$GITHUB_ENV"; echo "CXX=g++"     >> "$GITHUB_ENV"
          fi

      - name: Build & install protobuf ${{ matrix.protobuf }}
        run: |
          V="${{ matrix.protobuf }}"
          curl -fsSL -o protobuf.tar.gz \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${V}/protobuf-cpp-${V}.tar.gz"
          tar xf protobuf.tar.gz
          cd "protobuf-${V}"
          ./configure --prefix=/usr/local CXX="$CXX"
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig

      - name: build.sh (plugin + negative gate + binaries)
        working-directory: grpc-routing-meta/example
        run: ./build.sh

      - name: Run binaries, tests, bench (build.sh artifacts)
        working-directory: grpc-routing-meta/example
        run: |
          ./build/unified_sender
          ./build/receiver_verify
          ./build/test_projection
          ./build/bench_projection

      - name: CMake build
        working-directory: grpc-routing-meta/example
        run: |
          cmake -S . -B build-cmake -DCMAKE_CXX_COMPILER="$CXX"
          cmake --build build-cmake -j"$(nproc)"

      - name: CMake tests
        working-directory: grpc-routing-meta/example
        run: ctest --test-dir build-cmake --output-on-failure

  grpc-smoke:
    name: GrpcSink compile-smoke
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf + grpc dev
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            protobuf-compiler libprotobuf-dev libprotoc-dev libgrpc++-dev
      - name: Compile & smoke GrpcSink
        working-directory: grpc-routing-meta/example
        run: |
          cat > grpc_smoke.cc <<'EOF'
          #define ROUTINGMETA_WITH_GRPC
          #include "common/metadata_sink.h"
          int main() {
            grpc::ClientContext ctx;
            routingmeta::GrpcSink sink(&ctx);
            sink.Add("x-test", "1");          // exercises the byte-tracking Add + GrpcSink::Write
            return 0;
          }
          EOF
          g++ -std=c++17 -I src grpc_smoke.cc $(pkg-config --cflags --libs grpc++ protobuf) -o grpc_smoke
          ./grpc_smoke

  sanitizers:
    name: ASan+UBSan+LSan (clang)
    runs-on: ubuntu-22.04
    # The digest/encode/parser are hand-rolled C++ on raw bytes — exactly where
    # overruns and UB hide. Build the plugin + binaries instrumented and run them.
    env:
      CXX: clang++
      CXXFLAGS: "-std=c++17 -O1 -g -fno-omit-frame-pointer -fsanitize=address,undefined -fno-sanitize-recover=undefined"
      # ASan on Linux includes LSan. protobuf's process-lifetime globals are not
      # our leaks — suppress them (file documents why). Applies to the codegen
      # plugin subprocess too, so positive codegen still exits 0.
      ASAN_OPTIONS: "detect_leaks=1"
      LSAN_OPTIONS: "suppressions=tests/lsan.supp"
      UBSAN_OPTIONS: "print_stacktrace=1"
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf + clang
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang pkg-config \
            protobuf-compiler libprotobuf-dev libprotoc-dev
      - name: build.sh under ASan+UBSan (incl. negative gate)
        working-directory: grpc-routing-meta/example
        run: ./build.sh
      - name: Run binaries + tests under ASan+UBSan+LSan
        working-directory: grpc-routing-meta/example
        run: |
          ./build/test_projection
          ./build/unified_sender
          ./build/receiver_verify

  tsan:
    name: ThreadSanitizer (concurrent ProjectMeta)
    runs-on: ubuntu-22.04
    # ProjectMeta is claimed re-entrant (no shared mutable state). test_projection's
    # concurrency block runs it on N threads with distinct sinks and asserts a single
    # golden digest — run that under TSan to prove the claim.
    env:
      CXX: clang++
      CXXFLAGS: "-std=c++17 -O1 -g -fno-omit-frame-pointer -fsanitize=thread"
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf + clang
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang pkg-config \
            protobuf-compiler libprotobuf-dev libprotoc-dev
      - name: build.sh under TSan
        working-directory: grpc-routing-meta/example
        run: ./build.sh
      - name: Run concurrency test under TSan
        working-directory: grpc-routing-meta/example
        run: ./build/test_projection

  coverage:
    name: Coverage floor (hand-written src/)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf + gcovr
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config gcovr \
            protobuf-compiler libprotobuf-dev libprotoc-dev
      - name: Coverage gate (src/ >= 80% lines)
        working-directory: grpc-routing-meta/example
        run: CXX=g++ ./coverage.sh
