syntax = "proto3";
package routing;
import "google/protobuf/descriptor.proto";

// Slim model header layers
enum Layer {
  LAYER_UNSPECIFIED = 0;
  ENVELOPE = 1;   // Layer 1: x-request-id, x-target-system ...
  ROUTING  = 2;   // Layer 2: x-site-id, x-tool-id, x-route-profile ...
}

// For single-valued envelope/routing headers (Layer 1 + 2)
message HeaderField {
  Layer layer = 1;
  string key = 2;       // e.g. "x-tool-id"
  bool required = 3;
}

// For a field that is part of the repeated process-context projection (Layer 3)
message CtxField {
  string key = 2;       // query-string key, e.g. "chamber_id"
  bool required = 3;
}

extend google.protobuf.FieldOptions {
  HeaderField header = 50003;   // mark a scalar -> single-value Layer1/2 header
  CtxField    ctx    = 50004;   // mark a scalar inside the repeated context message -> Layer3 projection field
}
